<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; object-src 'none'; base-uri 'self'; form-action 'none'">
  <meta name="bemstat-default-base-url" content="https://bem130.github.io/bemstat/">
  <title>bemstat stat</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #f6f8fa;
      --panel: #ffffff;
      --control: #ffffff;
      --hover: #f6f8fa;
      --image-bg: #ffffff;
      --line: #d0d7de;
      --text: #1f2328;
      --muted: #57606a;
      --blue: #1f6feb;
      --green: #238636;
      --yellow: #bf8700;
      --red: #cf222e;
      --purple: #8250df;
      --teal: #0a7ea4;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0d1117;
        --panel: #161b22;
        --control: #0d1117;
        --hover: #21262d;
        --image-bg: #0d1117;
        --line: #30363d;
        --text: #f0f6fc;
        --muted: #8b949e;
        --blue: #58a6ff;
        --green: #3fb950;
        --yellow: #d29922;
        --red: #ff7b72;
        --purple: #bc8cff;
        --teal: #39c5cf;
      }
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 17px;
      line-height: 1.5;
    }

    header {
      border-bottom: 1px solid var(--line);
      background: var(--panel);
    }

    main,
    .header-inner {
      width: min(1440px, calc(100% - 32px));
      margin: 0 auto;
    }

    .header-inner {
      display: grid;
      gap: 8px;
      padding: 22px 0 18px;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.8rem, 2.4vw, 2.6rem);
      line-height: 1.15;
    }

    .meta {
      color: var(--muted);
      font-size: 1rem;
    }

    main {
      display: grid;
      gap: 22px;
      padding: 22px 0 40px;
    }

    section {
      display: grid;
      gap: 14px;
    }

    h2 {
      margin: 0;
      font-size: 1.35rem;
    }

    .summary {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 12px;
    }

    .metric {
      min-width: 0;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      padding: 14px;
    }

    .metric .label {
      color: var(--muted);
      font-size: 0.92rem;
    }

    .metric .value {
      margin-top: 6px;
      font-size: clamp(1.25rem, 2vw, 1.75rem);
      font-weight: 700;
      overflow-wrap: anywhere;
    }

    .controls {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
      gap: 12px;
      align-items: end;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      padding: 14px;
    }

    label {
      display: grid;
      gap: 5px;
      color: var(--muted);
      font-size: 0.94rem;
      font-weight: 600;
    }

    select,
    input {
      width: 100%;
      min-height: 38px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--control);
      color: var(--text);
      font: inherit;
      padding: 7px 9px;
    }

    .chart-panel,
    .table-panel,
    .image-grid,
    .notice-panel {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
    }

    .chart-panel {
      min-height: 360px;
      overflow-x: auto;
      padding: 12px;
    }

    .chart-panel svg {
      min-width: 900px;
      max-width: 100%;
      height: auto;
      display: block;
    }

    .table-panel {
      overflow: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 1rem;
    }

    th,
    td {
      border-bottom: 1px solid var(--line);
      padding: 8px 10px;
      text-align: right;
      white-space: nowrap;
    }

    th:first-child,
    td:first-child {
      text-align: left;
      position: sticky;
      left: 0;
      background: var(--panel);
      z-index: 1;
    }

    th {
      color: var(--muted);
      font-size: 0.9rem;
      font-weight: 700;
      text-transform: uppercase;
    }

    tbody tr:hover td {
      background: var(--hover);
    }

    .image-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(min(100%, 420px), 1fr));
      gap: 12px;
      padding: 12px;
    }

    .image-item {
      display: grid;
      gap: 8px;
    }

    .image-actions,
    .data-files {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    button,
    .data-file {
      min-height: 34px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--control);
      color: var(--text);
      font: inherit;
      font-size: 0.95rem;
      font-weight: 600;
      padding: 6px 10px;
    }

    button {
      cursor: pointer;
    }

    .data-file {
      display: inline-flex;
      align-items: center;
      text-decoration: none;
    }

    .image-size {
      display: inline-flex;
      grid-template-columns: none;
      align-items: center;
      gap: 6px;
      min-height: 34px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--control);
      color: var(--muted);
      font-size: 0.95rem;
      padding: 4px 8px;
    }

    .image-size select {
      width: auto;
      min-height: 26px;
      border: 0;
      padding: 0 2px;
      color: var(--text);
      font-size: 0.95rem;
      font-weight: 600;
    }

    button:hover,
    .data-file:hover {
      border-color: var(--blue);
      color: var(--blue);
    }

    .image-item h3 {
      margin: 0;
      font-size: 1.1rem;
    }

    .image-item img {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--image-bg);
    }

    .notice-panel {
      padding: 12px;
    }

    .split {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(min(100%, 360px), 1fr));
      gap: 14px;
    }

    .error {
      color: var(--red);
      font-weight: 700;
    }

    @media (max-width: 720px) {
      main,
      .header-inner {
        width: min(100% - 20px, 1440px);
      }

      .controls {
        grid-template-columns: 1fr;
      }

      th,
      td {
        padding: 7px 8px;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="header-inner">
      <h1>bemstat repository stat</h1>
      <div class="meta" id="meta">loading...</div>
    </div>
  </header>

  <main>
    <section>
      <div class="summary" id="summary"></div>
    </section>

    <section>
      <h2>Data files</h2>
      <div class="notice-panel data-files">
        <a class="data-file" id="jsonLink" href="stat/repo_stat.json">repo_stat.json</a>
        <button type="button" data-copy-url="stat/repo_stat.json">Copy JSON URL</button>
        <a class="data-file" id="csvLink" href="stat/repo_stat.csv">repo_stat.csv</a>
        <button type="button" data-copy-url="stat/repo_stat.csv">Copy CSV URL</button>
      </div>
      <div class="meta" id="copyStatus" aria-live="polite"></div>
    </section>

    <section>
      <h2>Interactive chart</h2>
      <div class="controls">
        <label>
          Group
          <select id="groupSelect">
            <option value="repository">Repository</option>
            <option value="extension">Extension</option>
            <option value="language">Language</option>
            <option value="content">Content kind</option>
            <option value="owner">Owner</option>
          </select>
        </label>
        <label>
          Metric
          <select id="metricSelect">
            <option value="lines">Lines</option>
            <option value="bytes">Bytes</option>
            <option value="files">Files</option>
            <option value="chars">Chars</option>
            <option value="source">Source</option>
            <option value="document">Document</option>
            <option value="doc_comment">Doc comment</option>
            <option value="data">Data</option>
            <option value="test">Test</option>
            <option value="comment">Comment</option>
            <option value="other">Other</option>
            <option value="testCases">Test cases</option>
          </select>
        </label>
        <label id="ownerControl">
          Owner
          <select id="ownerSelect"></select>
        </label>
        <label>
          Search
          <input id="searchInput" type="search" autocomplete="off" placeholder="filter">
        </label>
        <label>
          Sort
          <select id="sortSelect">
            <option value="desc">Descending</option>
            <option value="asc">Ascending</option>
            <option value="name">Name</option>
          </select>
        </label>
        <label>
          Show
          <select id="chartLimitSelect">
            <option value="10">10 rows</option>
            <option value="24">24 rows</option>
            <option value="50">50 rows</option>
            <option value="100">100 rows</option>
            <option value="all">All rows</option>
          </select>
        </label>
      </div>
      <div class="chart-panel" id="interactiveChart"></div>
      <div class="table-panel">
        <table>
          <thead id="mainTableHead"></thead>
          <tbody id="mainTableBody"></tbody>
        </table>
      </div>
    </section>

    <section>
      <h2>Static images</h2>
      <div class="image-grid" id="staticImages"></div>
    </section>

    <section class="split">
      <div>
        <h2>Unknown extensions</h2>
        <div class="table-panel">
          <table>
            <thead>
              <tr><th>Name</th><th>Files</th><th>Lines</th><th>Bytes</th></tr>
            </thead>
            <tbody id="unknownBody"></tbody>
          </table>
        </div>
      </div>
      <div>
        <h2>Skipped</h2>
        <div class="table-panel">
          <table>
            <thead>
              <tr><th>File</th><th>Reason</th><th>Bytes</th></tr>
            </thead>
            <tbody id="skippedBody"></tbody>
          </table>
        </div>
      </div>
    </section>

    <section>
      <h2>Errors</h2>
      <div class="notice-panel" id="errorsPanel"></div>
    </section>
  </main>

  <script src="app.js" defer></script>
</body>
</html>
