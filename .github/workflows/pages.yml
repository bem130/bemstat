name: Deploy stat dashboard

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: "17 0,12 * * *"
      timezone: "Asia/Tokyo"

permissions: {}

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        # actions/checkout@v4
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Setup Node
        # actions/setup-node@v4
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate stat
        run: npm run generate
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Upload Pages artifact
        # actions/upload-pages-artifact@v3
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa
        with:
          path: docs

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        # actions/deploy-pages@v4
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e

  purge-cache:
    runs-on: ubuntu-latest
    needs: deploy
    permissions:
      contents: read
    steps:
      - name: Checkout purge script
        # actions/checkout@v4
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Setup Node
        # actions/setup-node@v4
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "24"

      - name: Purge README image cache with hub-purge
        # koki-develop/hub-purge-action@v1.0.3
        uses: koki-develop/hub-purge-action@c608e39abca23026c802f44643cffccc123a826f
        continue-on-error: true
        with:
          repository: ${{ github.repository }}
          branch: ${{ github.event.repository.default_branch || 'main' }}
          path: README.md

      - name: Purge configured README picture source caches
        env:
          BEMSTAT_PURGE_TARGETS: ${{ vars.BEMSTAT_PURGE_TARGETS }}
          BEMSTAT_PURGE_CAMO_URLS: ${{ vars.BEMSTAT_PURGE_CAMO_URLS }}
          BEMSTAT_PURGE_STRICT: ${{ vars.BEMSTAT_PURGE_STRICT }}
          BEMSTAT_PURGE_DEFAULT_REPOSITORY: ${{ github.repository }}
          BEMSTAT_PURGE_DEFAULT_BRANCH: ${{ github.event.repository.default_branch || 'main' }}
        run: node scripts/purge_camo_cache.mjs
